apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-demo
  namespace: gitops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-demo
  template:
    metadata:
      labels:
        app: gitops-demo
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gitops-demo
          image: 13.229.91.116:30002/demo/gitops-demo:v1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: APP_COLOR
              value: "green"
            - name: APP_ENV
              value: "dev"
            - name: FEATURE_FLAG
              value: "on"
            - name: APP_VERSION
              value: "v1.0.0"
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gitops-demo
  namespace: gitops-demo
spec:
  type: NodePort
  selector:
    app: gitops-demo
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30088
