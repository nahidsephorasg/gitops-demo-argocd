apiVersion: v1
kind: Namespace
metadata:
  name: gitops-demo-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-demo
  namespace: gitops-demo-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-demo
  template:
    metadata:
      labels:
        app: gitops-demo
    spec:
      containers:
        - name: gitops-demo
          image: ghcr.io/nahidsephorasg/gitops-demo:77a8e88
          ports:
            - containerPort: 8080
          env:
            - name: APP_COLOR
              value: "green"
            - name: APP_ENV
              value: "dev"
            - name: FEATURE_FLAG
              value: "on"
---
apiVersion: v1
kind: Service
metadata:
  name: gitops-demo
  namespace: gitops-demo-dev
spec:
  type: NodePort
  selector:
    app: gitops-demo
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30089
